<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passeggiata Dannunziana - Web App</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Georgia', serif; margin: 0; display: flex; height: 100vh; background: #0a0a0a; color: #f5f5f5; }
        #sidebar { width: 300px; background: #1a1a1a; border-right: 1px solid #d4af37; padding: 20px; overflow-y: auto; }
        #main-content { flex-grow: 1; display: flex; flex-direction: column; }
        #map { height: 60%; width: 100%; border-bottom: 2px solid #d4af37; }
        #details { padding: 20px; height: 40%; overflow-y: auto; background: #000; }
        .tappa-item { padding: 10px; margin-bottom: 10px; border: 1px solid #333; cursor: pointer; border-radius: 5px; }
        .tappa-item.active { border-color: #d4af37; background: #222; }
        
        /* Stili per i riquadri delle citazioni e dei dati */
        .quote-box { background: #1a0000; color: #d4af37; padding: 15px; border-left: 5px solid #8b0000; margin-top: 15px; font-style: italic; }
        .data-box { background: #222; color: #f5f5f5; padding: 15px; border-left: 5px solid #d4af37; margin-top: 10px; }
        
        h1, h2 { color: #d4af37; }
        .progress-bar { height: 5px; background: #d4af37; width: 0%; transition: width 0.3s; }
    </style>
</head>
<body>

<div id="sidebar">
    <h1>Itinerario</h1>
    <div id="timeline">
        </div>
</div>

<div id="main-content">
    <div class="progress-bar" id="progress"></div>
    <div id="map"></div>
    <div id="details">
        <h2 id="tappa-nome">Seleziona una tappa per iniziare</h2>
        <p id="tappa-desc"></p>
        <div id="tappa-esperienza"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Variabile per memorizzare i dati
    let currentData = null;
    
    // Inizializzazione della Mappa al centro di Roma
    let map = L.map('map').setView([41.9028, 12.4964], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Caricamento Dati (Il "Ponte Digitale")
    async function initApp() {
        try {
            const response = await fetch('data.json');
            const data = await response.json();
            currentData = data.itinerari[0];
            renderTimeline();
            loadTappa(0); // Carica la prima tappa in automatico
        } catch (e) { 
            console.error("Errore caricamento dati:", e); 
        }
    }

    // Crea la lista delle tappe nella barra laterale
    function renderTimeline() {
        const container = document.getElementById('timeline');
        currentData.tappe.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = 'tappa-item';
            div.innerHTML = `<strong>${t.numero}.</strong> ${t.nome} <br> <small>${t.orario_consigliato}</small>`;
            div.onclick = () => loadTappa(i);
            container.appendChild(div);
        });
    }

    // Mostra a schermo i dati della singola tappa
    function loadTappa(index) {
        const tappa = currentData.tappe[index];
        
        // 1. Aggiorna i testi principali
        document.getElementById('tappa-nome').innerText = tappa.nome;
        document.getElementById('tappa-desc').innerText = tappa.descrizione_storica;
        document.getElementById('progress').style.width = ((index + 1) / currentData.tappe.length * 100) + "%";

        // 2. Aggiorna il riquadro dell'Esperienza (Citazione Letteratura + Dati AI/Musica)
        const esp = document.getElementById('tappa-esperienza');
        esp.innerHTML = `
            <div class="quote-box">
                <em style="font-size: 1.1em;">"${tappa.esperienza_culturale.letteratura.citazione}"</em><br>
                <small style="color: #a3a3a3; display: block; margin-top: 10px;">— Tratto da: ${tappa.esperienza_culturale.letteratura.opera}</small>
            </div>
            
            <div class="data-box">
                <strong>Emozione Target (Input AI):</strong> ${tappa.esperienza_culturale.atmosfera.emozione_target} <br>
                <strong>Musica per l'Atmosfera:</strong> ${tappa.esperienza_culturale.musica.brano} di ${tappa.esperienza_culturale.musica.autore}
            </div>
        `;

        // 3. Sposta la mappa e metti il segnalino
        map.setView(tappa.coordinate, 16);
        L.marker(tappa.coordinate).addTo(map)
            .bindPopup(tappa.nome).openPopup();
    }

    // Fai partire l'app
    initApp();
</script>
</body>
</html>
